[experiment]
seed = 1234

[training]
dataset_path = ./data
# 实验输出目录，建议每次新尝试都修改版本号以防覆盖
save_dir = ./results/FMA-Net_BlindPixel_expand_v1
# Stage2 依旧从 Stage1 的目录加载 Net_D 的预训练权重
stage1_pretrained_dir = ./results/FMA-Net_BlindPixel
log_dir = ./results/log_dir

gpu = 0
nThreads = 12
batch_size = 4

# 学习率策略：续训通常使用较低的学习率
lr = 0.0001
lr_drop_epoch = 120
lr_after_drop = 0.00005
lr_dynamic_after_drop = True
dynamic_min_lr = 0.000001
num_epochs = 400
finetuning = False
need_patch = True
save_train_img = False
patch_size = 128
scale = 1
stage = 2
num_seq = 5

# 混合精度与性能优化
use_amp = True
amp_dtype = bf16
cudnn_benchmark = True
cuda_launch_blocking = False
pin_memory = True
persistent_workers = True
prefetch_factor = 2
grad_clip_norm = 0.5

# AMP（自动混合精度）相关高级设置
amp_init_scale = 1024
amp_growth_interval = 12000
amp_backoff_factor = 0.5
overflow_patience = 2
lr_overflow_decay = 0.7
min_lr = 0.0000005
overflow_lr_decay_cooldown = 80
overflow_log_interval = 20
amp_recovery_steps = 256

# --- 超参 / Loss 权重 (集中管理) ---
# 把所有损失权重与盲元专项 loss 系数集中到 [loss] 节，便于调参对比和实验记录。
# 其中 blind_mask_threshold 和 fusion 相关的可学习参数仍在各自区块管理。
checkpoint_psnr_tolerance = 0.0001
checkpoint_blind_l1_tolerance = 0.000001

[network]
in_channels = 1
dim = 80
ds_kernel_size = 3
us_kernel_size = 3
num_RDB = 16
growth_rate = 18
num_dense_layer = 4
num_flow = 5
num_FRMA = 3
num_transformer_block = 2
num_heads = 5
LayerNorm_type = WithBias
ffn_expansion_factor = 2.66
bias = True

# --- 融合逻辑权重 (核心修改) ---
# （已移动至 [fusion] 节以便把可学习参数集中管理）
[validation]
val_period = 5


[fusion]
# 融合 / 盲元 参数（集中放置）：
# - base_alpha, base_beta：融合权重的初始值（在 Net_R 中作为可学习参数，通过 sigmoid 映射到 [0,1]）。
#   这些为训练和推理时使用的可学习参数。
base_alpha = 0.5
base_beta = 0.5
# - blind_res_scale：盲元残差分支输出的初始缩放（可学习，通过 softplus 映射为正值以保证 >0）。
blind_res_scale = 1.40
# - blind_infer_threshold：仅在推理（无 GT）时使用，用于从中心 LR 推断盲元掩码。
blind_infer_threshold = 0.10

[test]
# custom_path 指向测试集路径
custom_path = ./data/test_blur
test_mask_csv = ./data/test_mask/001/blind_pixel_coords.csv

[loss]
# 所有损失函数权重放在此处：便于对比实验与统一管理
# 说明：这些系数用于组合 total_loss，请参考代码中相应变量名称
lr_warping_loss_weight = 0.1
hr_warping_loss_weight = 0.1
flow_loss_weight = 0.1
D_TA_loss_weight = 0.1
R_TA_loss_weight = 0.1
Net_D_weight = 0.1
# 盲元判定阈值（用于 mask 计算）仍保留在 training 区或 fusion 区
blind_restore_loss_weight = 0.6
# blind_res_loss_weight: 权重用于 blind_res 分支的残差损失（之前硬编码为 2.0）
blind_res_loss_weight = 2.0
blind_mask_threshold = 0.025
# 之前在 train.py 中硬编码的额外缩放参数（已移到此处）
# flow_loss_scale：流场损失的乘法缩放（原先为 10.0）
flow_loss_scale = 10.0
# smart_blind_l2_scale：在 smart_recon_loss 中对盲元区域的 L2 损失的乘法缩放（原先为 1000.0）
smart_blind_l2_scale = 1000.0
# smart_blind_topk_frac：用于在 smart_recon_loss 中确定 top-k 阈值的比例（原先为 0.005）
smart_blind_topk_frac = 0.005
