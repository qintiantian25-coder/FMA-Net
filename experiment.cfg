[experiment]
seed = 1234

[training]
dataset_path = ./data
# Save this run to an isolated folder to avoid overwriting previous experiments.
save_dir = ./results/FMA-Net_BlindPixel_expand_v1
# Stage2 still loads Net_D from the previous Stage1 directory.
stage1_pretrained_dir = ./results/FMA-Net_BlindPixel
log_dir = ./results/log_dir

gpu = 0
nThreads = 12
batch_size = 4
;lr = 0.0001
;lr_drop_epoch = 120
;lr_after_drop = 0.00005
;# 120轮前保持0.0001，之后从0.00005开始自动cosine衰减到dynamic_min_lr。
;lr_dynamic_after_drop = True
lr = 0.00001
lr_drop_epoch = 390
lr_after_drop = 0.00001
# Keep dynamic cosine decay enabled after the immediate drop.
lr_dynamic_after_drop = True
# 续训安全策略：几乎立即进入低学习率，再做动态cosine衰减，避免高lr冲坏已收敛权重。
dynamic_min_lr = 0.000001
num_epochs = 430
finetuning = True
need_patch = True
save_train_img = False
patch_size = 128
scale = 1
stage = 2
num_seq = 5
use_amp = True
amp_dtype = bf16
cudnn_benchmark = True
cuda_launch_blocking = False
pin_memory = True
persistent_workers = True
prefetch_factor = 2
grad_clip_norm = 0.5
amp_init_scale = 1024
amp_growth_interval = 12000
amp_backoff_factor = 0.5
overflow_patience = 2
lr_overflow_decay = 0.7
min_lr = 0.0000005
overflow_lr_decay_cooldown = 80
overflow_log_interval = 20
amp_recovery_steps = 256

lr_warping_loss_weight = 0.1
hr_warping_loss_weight = 0.1
flow_loss_weight = 0.1
D_TA_loss_weight = 0.1
R_TA_loss_weight = 0.1
Net_D_weight = 0.1
blind_mask_threshold = 0.025
blind_restore_loss_weight = 0.6
blind_res_scale = 1.20
blind_infer_threshold = 0.10
checkpoint_psnr_tolerance = 0.0001
checkpoint_blind_l1_tolerance = 0.000001

[network]
in_channels = 1
dim = 80
ds_kernel_size = 3
us_kernel_size = 3
num_RDB = 16
growth_rate = 18
num_dense_layer = 4
num_flow = 5
num_FRMA = 3
num_transformer_block = 2
num_heads = 5
LayerNorm_type = WithBias
ffn_expansion_factor = 2.66
bias = True

[validation]
val_period = 5
save_val_align_vis = False
enable_align_metrics = True
align_metrics_period = 20

[test]
# fill_strength = 1.0  # 1.0为默认力度，>1增强填补，<1减弱填补
custom_path = ./data/test_blur
test_mask_csv = ./data/test_mask/001/blind_pixel_coords.csv
