[experiment]
seed = 1234

[training]
dataset_path = ./data
# 实验输出目录，建议每次新尝试都修改版本号以防覆盖
save_dir = ./results/FMA-Net_BlindPixel_expand_v1
# Stage2 依旧从 Stage1 的目录加载 Net_D 的预训练权重
stage1_pretrained_dir = ./results/FMA-Net_BlindPixel
log_dir = ./results/log_dir

gpu = 0
nThreads = 12
batch_size = 2

# 学习率策略：续训通常使用较低的学习率
lr = 0.00001
lr_drop_epoch = 390
lr_after_drop = 0.00001
# 开启动态余弦衰减
lr_dynamic_after_drop = True
dynamic_min_lr = 0.000001
num_epochs = 450
finetuning = True
need_patch = True
save_train_img = False
patch_size = 128
scale = 1
stage = 2
num_seq = 5

# 混合精度与性能优化
use_amp = True
amp_dtype = bf16
cudnn_benchmark = True
cuda_launch_blocking = False
pin_memory = True
persistent_workers = True
prefetch_factor = 2
grad_clip_norm = 0.5

# AMP（自动混合精度）相关高级设置
amp_init_scale = 1024
amp_growth_interval = 12000
amp_backoff_factor = 0.5
overflow_patience = 2
lr_overflow_decay = 0.7
min_lr = 0.0000005
overflow_lr_decay_cooldown = 80
overflow_log_interval = 20
amp_recovery_steps = 256

# 损失函数权重分配
lr_warping_loss_weight = 0.1
hr_warping_loss_weight = 0.1
flow_loss_weight = 0.1
D_TA_loss_weight = 0.1
R_TA_loss_weight = 0.1
Net_D_weight = 0.1
blind_mask_threshold = 0.025
blind_restore_loss_weight = 0.6

# 盲元处理参数
blind_res_scale = 1.20
blind_infer_threshold = 0.10
checkpoint_psnr_tolerance = 0.0001
checkpoint_blind_l1_tolerance = 0.000001

[network]
in_channels = 1
dim = 80
ds_kernel_size = 3
us_kernel_size = 3
num_RDB = 16
growth_rate = 18
num_dense_layer = 4
num_flow = 5
num_FRMA = 3
num_transformer_block = 2
num_heads = 5
LayerNorm_type = WithBias
ffn_expansion_factor = 2.66
bias = True

# --- 融合逻辑权重 (核心修改) ---
# base_alpha: 邻帧补偿(DUF)的基础权重。设为0.8，表示大幅度信任相邻清晰帧。
base_alpha = 0.8
# base_beta: 自身重构(Res)的基础权重。设为0.2，提供基础结构信息。
base_beta = 0.2

[validation]
val_period = 5
save_val_align_vis = True
enable_align_metrics = True
align_metrics_period = 10

[test]
# custom_path 指向测试集路径
custom_path = ./data/test_blur
test_mask_csv = ./data/test_mask/001/blind_pixel_coords.csv