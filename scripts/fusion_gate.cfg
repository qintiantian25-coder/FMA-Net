# Config for standalone fusion-gate scripts.
# Priority rule: CLI args > this file > script built-in defaults.

[common]
# Base experiment config used by Config(...)
config_path = ./experiment.cfg

[finetune]
# Required unless passed by CLI
base_ckpt = ./results/FMA-Net_BlindPixel/model_stage2/model_best.pt
save_dir = ./results/gate_finetune

# Training hyper-parameters for gate-only fine-tuning
# Balanced preset: stronger blind-region cleanup with low risk of over-enhancement.
epochs = 30
lr = 0.00015
hidden_channels = 24
fill_strength = 1.10
# Lower threshold to include more gray/deep-gray halo pixels as blind regions.
blind_threshold = 0.06
blind_loss_weight = 1.6
log_period = 100
# Validate every N epochs to avoid expensive per-epoch full validation.
val_period = 10
# 0 means full validation set; set >0 for quick sampled validation during tuning.
max_val_batches = 0
# Enable mixed precision for gate finetune; bf16 is preferred for stability.
use_amp = true
amp_dtype = bf16
num_workers = 12
seed = 1234

[eval]
# Required unless passed by CLI
base_ckpt = ./results/FMA-Net_BlindPixel/model_stage2/model_best.pt
# Optional
# gate_ckpt = ./results/gate_finetune/gate_best.pt

split = val
fill_strength = 1.10
blind_threshold = 0.06
save_dir = ./results/gate_eval
max_save = 20
hidden_channels = 24

[compare]
# Required unless passed by CLI
base_ckpt = ./results/FMA-Net_BlindPixel/model_stage2/model_best.pt
gate_ckpt = ./results/gate_finetune/gate_best.pt

split = val
fill_strength = 1.10
blind_threshold = 0.06
